<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DIA Grade Pro Secure</title>
<style>
:root{--p:#1e40af;--s:#15803d;--d:#b91c1c;--bg:#f1f5f9}*{box-sizing:border-box;font-family:sans-serif}body{margin:0;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}#login{position:fixed;inset:0;background:var(--p);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;color:#fff}#login input{padding:12px;border-radius:8px;border:none;margin:10px;width:200px;text-align:center;font-size:18px}#app{display:none;flex-direction:column;height:100%}.top{background:#fff;padding:8px;border-bottom:3px solid var(--p)}.row{display:flex;gap:5px;align-items:flex-end;flex-wrap:wrap;margin-bottom:5px}.fld{display:flex;flex-direction:column}label{font-size:9px;font-weight:700;color:#64748b}input,select{padding:4px;border:1px solid #cbd5e1;border-radius:4px;font-size:13px;outline:0}.bar{background:#e2e8f0;padding:8px;display:flex;gap:8px;align-items:center}.btn{padding:6px 12px;border:0;border-radius:4px;color:#fff;font-weight:700;cursor:pointer;font-size:12px}.b-p{background:var(--p)}.b-s{background:var(--s)}.b-d{background:var(--d)}.b-w{background:#f59e0b}main{flex:1;overflow:auto;padding:8px}table{border-collapse:collapse;background:#fff;width:auto;margin:0 auto;font-size:12px}th,td{border:1px solid #475569;padding:4px 6px;text-align:center;white-space:nowrap}th{background:#1e293b;color:#fff}.ann{background:#f0fdf4;font-weight:700;color:var(--p)}#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;overflow-y:auto;padding:10px}.card{background:#fff;width:280mm;margin:0 auto;padding:20px;border:2.5px solid #000;color:#000;text-align:center;display:flex;flex-direction:column;align-items:center}.fitted-box{display:inline-block;border:2px solid #000;padding:4px 12px;margin-bottom:8px;font-weight:700}.i-g{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:5px auto;width:100%;max-width:780px;font-size:13px;border:2px solid #000;padding:8px}.c-t{width:100%;max-width:780px;margin:5px auto;border-collapse:collapse}.c-t td,.c-t th{border:2px solid #000;padding:4px 10px}.sig-wrap{margin-top:20px;display:flex;justify-content:space-around;width:100%;max-width:780px;border:2px solid #000;padding:15px 0}.sig-line{margin:15px auto 5px auto;border-bottom:1px dotted #000;width:80%}@media print{.no-p{display:none!important}#modal{position:absolute;top:0;background:#fff}.card{border:0;width:100%}}
</style>
</head>
<body>
<div id="login">
    <h2>DIA Grade Pro</h2>
    <input type="password" id="passInput" placeholder="ይለፍ ቃል ያስገቡ">
    <button class="btn b-s" onclick="checkPass()" style="padding:10px 30px">ክፈት</button>
    <p id="err" style="color:#ffcfcf;font-size:12px"></p>
</div>
<div id="app">
    <div class="top">
        <div class="row">
            <input type="text" id="h_s" value="DILIGENT INTELLECTUALS ACADEMY" style="width:250px">
            <select id="h_m" onchange="init()"><option value="semester">Semester</option><option value="quarter">Quarter</option></select>
            <input type="text" id="h_g" value="Grade 4" style="width:70px">
            <input type="text" id="h_b" value="Math, English, Amharic, Science, IT" style="width:230px">
            <button class="btn b-p" onclick="init()">SETUP</button>
            <button class="btn b-d" onclick="location.reload()">LOCK 🔒</button>
        </div>
        <div class="row" style="border-top:1px solid #eee;padding-top:8px">
            <input type="hidden" id="e_k" value="-1">
            <div class="fld"><label>ተቁ</label><input type="number" id="e_n" style="width:40px"></div>
            <div class="fld"><label>ስም</label><input type="text" id="e_m" style="width:160px"></div>
            <div class="fld"><label>ጾታ</label><select id="e_x"><option value="">-</option><option>M</option><option>F</option></select></div>
            <div class="fld"><label>ዕድሜ</label><input type="number" id="e_a" style="width:40px"></div>
            <div class="fld"><label>Term</label><select id="e_t"></select></div>
            <div id="mks" style="display:flex;gap:3px"></div>
            <button class="btn b-s" id="svBtn" onclick="save()">SAVE</button>
            <button class="btn b-w" onclick="resetForm()">CLEAR</button>
        </div>
    </div>
    <div class="bar">
        <button class="btn b-p" onclick="exportData()">BACKUP</button>
        <button id="undoBtn" class="btn b-w" style="display:none" onclick="undo()">UNDO ↩️</button>
        <div id="msg" style="flex:1;text-align:center;font-weight:700;color:var(--d)"></div>
        <input type="text" id="q" placeholder="🔍 ፈልግ..." onkeyup="render()" style="width:180px">
    </div>
    <main><table><thead><tr id="th"></tr></thead><tbody id="tb"></tbody></table></main>
</div>
<div id="modal">
    <div class="no-p" style="text-align:center;margin-bottom:10px">
        <button class="btn b-d" onclick="closeM()">CLOSE</button> 
        <button class="btn b-s" onclick="window.print()">PRINT</button>
    </div>
    <div id="cc"></div>
</div>
<script>
const P="1234",K='_DIA_DATA_V22';let D=JSON.parse(localStorage.getItem(K))||[],S=[],lastDeleted=null;
function checkPass(){if(document.getElementById('passInput').value===P){document.getElementById('login').style.display='none';document.getElementById('app').style.display='flex';init()}else{document.getElementById('err').innerText="የተሳሳተ ይለፍ ቃል!"}}
function init(){S=document.getElementById('h_b').value.split(',').map(x=>x.trim()).filter(x=>x);const m=document.getElementById('h_m').value;document.getElementById('e_t').innerHTML=m==='semester'?'<option value="1">S1</option><option value="2">S2</option>':'<option value="1">Q1</option><option value="2">Q2</option><option value="3">Q3</option><option value="4">Q4</option>';document.getElementById('mks').innerHTML=S.map((s,i)=>`<div class="fld"><label>${s[0]}</label><input type="number" class="mi" id="m_${i}" data-s="${s}" oninput="if(this.value.length>=2) jump(${i})" style="width:38px;text-align:center"></div>`).join('');if(document.getElementById('e_k').value==="-1")document.getElementById('e_n').value=gn();render()}
function jump(i){const nxt=document.getElementById(`m_${i+1}`);if(nxt)nxt.focus();else document.getElementById('svBtn').focus()}
function gn(){const n=D.map(x=>parseFloat(x.no)).filter(v=>!isNaN(v));return n.length?Math.max(...n)+1:1}
function gr(v,l){if(!l||!l.length)return"-";const s=[...new Set(l)].sort((a,b)=>b-a);return(s.indexOf(v)+1)+"/"+l.length}
function save(){const n=document.getElementById('e_m'),a=document.getElementById('e_a'),x=document.getElementById('e_x'),t=document.getElementById('e_t'),k=document.getElementById('e_k').value;if(!n.value.trim()||!x.value||!a.value){msg.innerText="⚠️ መረጃ ጎድሏል!";return}let ms={},tot=0,err=0;document.querySelectorAll('.mi').forEach(i=>{if(!i.value)err=1;let v=parseFloat(i.value)||0;ms[i.dataset.s]=v;tot+=v});if(err){msg.innerText="⚠️ ውጤት ይሙሉ!";return}const obj={id:k==="-1"?Date.now():parseFloat(k),no:document.getElementById('e_n').value,name:n.value.trim(),sex:x.value,age:a.value,grade:document.getElementById('h_g').value,mode:document.getElementById('h_m').value,term:parseInt(t.value),marks:ms,total:tot,avg:tot/S.length};if(k==="-1")D.push(obj);else D[D.findIndex(x=>x.id==k)]=obj;localStorage.setItem(K,JSON.stringify(D));msg.style.color="var(--s)";msg.innerText="✅ ተቀምጧል!";setTimeout(()=>msg.innerText="",1200);if(k==="-1"&&parseInt(t.value)<(document.getElementById('h_m').value==='semester'?2:4)){t.value=parseInt(t.value)+1;document.querySelectorAll('.mi').forEach(i=>i.value="");document.getElementById('m_0').focus()}else{resetForm()}render()}
function del(id){if(confirm("ይህ መረጃ እንዲጠፋ እርግጠኛ ነዎት?")){lastDeleted=D.find(x=>x.id==id);D=D.filter(x=>x.id!=id);localStorage.setItem(K,JSON.stringify(D));document.getElementById('undoBtn').style.display='inline-block';render()}}
function undo(){if(lastDeleted){D.push(lastDeleted);localStorage.setItem(K,JSON.stringify(D));lastDeleted=null;document.getElementById('undoBtn').style.display='none';render()}}
function resetForm(){document.getElementById('e_k').value="-1";document.getElementById('e_m').value="";document.getElementById('e_x').value="";document.getElementById('e_a').value="";document.getElementById('e_t').value=1;document.querySelectorAll('.mi').forEach(i=>i.value="");document.getElementById('e_n').value=gn()}
function render(){const b=document.getElementById('tb'),m=document.getElementById('h_m').value,f=document.getElementById('q').value.toLowerCase();document.getElementById('th').innerHTML=`<th>ተቁ</th><th>ስም</th><th>ጾታ</th><th>Term</th>${S.map(s=>`<th>${s[0]}</th>`).join('')}<th>Tot</th><th>Avg</th><th>Rk</th><th>Act</th>`;const ns=[...new Set(D.filter(x=>x.mode===m&&x.name.toLowerCase().includes(f)).map(x=>x.name))];b.innerHTML="";const al=ns.map(n=>{const d=D.filter(x=>x.name===n&&x.mode===m);return d.reduce((s,r)=>s+r.avg,0)/d.length});ns.forEach(n=>{const sd=D.filter(x=>x.name===n&&x.mode===m).sort((a,b)=>a.term-b.term),tr=sd.length+1;sd.forEach((r,i)=>{const tl=D.filter(x=>x.term===r.term&&x.mode===m).map(x=>x.avg);let rw=`<tr>`;if(i===0)rw+=`<td rowspan="${tr}">${r.no}</td><td rowspan="${tr}" style="text-align:left">${r.name}</td><td rowspan="${tr}">${r.sex}</td>`;rw+=`<td>T${r.term}</td>${S.map(s=>`<td>${r.marks[s]||0}</td>`).join('')}<td>${r.total.toFixed(0)}</td><td>${r.avg.toFixed(1)}</td><td>${gr(r.avg,tl)}</td><td><button onclick="edit(${r.id})">✏️</button><button onclick="del(${r.id})">🗑️</button></td></tr>`;b.innerHTML+=rw});const av=sd.reduce((s,r)=>s+r.avg,0)/sd.length,at=sd.reduce((s,r)=>s+r.total,0)/sd.length;b.innerHTML+=`<tr class="ann"><td><b>ANN</b></td>${S.map(s=>`<td>${(sd.reduce((u,r)=>u+(r.marks[s]||0),0)/sd.length).toFixed(0)}</td>`).join('')}<td>${at.toFixed(0)}</td><td>${av.toFixed(1)}</td><td>${gr(av,al)}</td><td><button class="btn b-p" onclick="card('${n}')">CARD</button></td></tr>`})}
function edit(id){const r=D.find(x=>x.id==id);document.getElementById('e_k').value=r.id;document.getElementById('e_m').value=r.name;document.getElementById('e_n').value=r.no;document.getElementById('e_x').value=r.sex;document.getElementById('e_a').value=r.age;document.getElementById('e_t').value=r.term;S.forEach((s,i)=>{if(document.getElementById(`m_${i}`))document.getElementById(`m_${i}`).value=r.marks[s]});render();document.getElementById('m_0').focus()}
function card(n){const m=document.getElementById('h_m').value,sd=D.filter(x=>x.name===n&&x.mode===m).sort((a,b)=>a.term-b.term),tc=m==='semester'?[1,2]:[1,2,3,4],av=sd.reduce((s,r)=>s+r.avg,0)/sd.length,at=sd.reduce((s,r)=>s+r.total,0)/sd.length,al=[...new Set(D.filter(x=>x.mode===m).map(x=>x.name))].map(nm=>{const d=D.filter(x=>x.name===nm&&x.mode===m);return d.reduce((s,r)=>s+r.avg,0)/d.length});const ng=(parseInt(sd[0].grade.replace(/\D/g,''))||0)+1;document.getElementById('cc').innerHTML=`<div class="card"><div class="fitted-box">${document.getElementById('h_s').value}</div><br><div class="fitted-box" style="font-size:16px">STUDENT PROGRESS REPORT CARD (2016 E.C)</div><div class="i-g"><div>Name: <b>${n}</b></div><div>Sex: <b>${sd[0].sex}</b></div><div>Age: <b>${sd[0].age}</b></div><div>Grade: <b>${sd[0].grade}</b></div><div>ID No: <b>${sd[0].no}</b></div><div>Avg: <b>${av.toFixed(1)}%</b></div></div><table class="c-t"><thead><tr><th style="width:130px">SUBJECTS</th>${tc.map(t=>`<th>T${t}</th>`).join('')}<th>ANNUAL AVG</th></tr></thead><tbody>${S.map(s=>{const sc=(sd.reduce((u,r)=>u+(r.marks[s]||0),0)/sd.length).toFixed(1);return `<tr><td style="text-align:left"><b>${s}</b></td>${tc.map(t=>`<td>${sd.find(x=>x.term==t)?.marks[s]??'-'}</td>`).join('')}<td><b>${sc}</b></td></tr>`}).join('')}<tr style="background:#eee;font-weight:700"><td>TOTAL SCORE</td>${tc.map(t=>`<td>${sd.find(x=>x.term==t)?.total.toFixed(0)??'-'}</td>`).join('')}<td>${at.toFixed(0)}</td></tr><tr style="background:#f9f9f9;font-weight:700"><td>AVERAGE (%)</td>${tc.map(t=>`<td>${sd.find(x=>x.term==t)?.avg.toFixed(1)??'-'}%</td>`).join('')}<td>${av.toFixed(1)}%</td></tr><tr style="font-weight:700"><td>RANK</td>${tc.map(t=>`<td>${gr(sd.find(x=>x.term==t)?.avg,D.filter(x=>x.term==t&&x.mode==m).map(x=>x.avg))}</td>`).join('')}<td>${gr(av,al)}</td></tr></table><div class="p-b">${av>=50?`✅ ውጤቱ ከ50% በላይ በመሆኑ ወደ ${ng}ኛ ክፍል ተዘዋውሯል (Promoted)`:`❌ ውጤቱ ከ50% በታች በመሆኑ አልተዘዋወረም (Detained)`}</div><div class="sig-wrap"><div class="sig-box"><div class="sig-line"></div><div>የክፍል ተጠሪ መ/ር ፊርማ</div></div><div class="sig-box"><div class="sig-line"></div><div>የርዕሰ መምህር ፊርማ</div></div></div></div>`;document.getElementById('modal').style.display='block'}
function closeM(){document.getElementById('modal').style.display='none'}
function exportData(){const b=new Blob([JSON.stringify(D)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`DIA_Backup.json`;a.click()}
</script>
</body>
</html>
